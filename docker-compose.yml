services:
  db:
    image: postgres:16-alpine
    container_name: casamento-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: casamento
      POSTGRES_USER: casamento
      POSTGRES_PASSWORD: casamento_dev
    volumes:
      - casamento_postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casamento -d casamento"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  casamento_postgres_data:
